name: in_salah
description: "Modern Islamic Prayer Time & Missed Prayer Tracker"
publish_to: 'none'
version: 1.3.2+14

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  intl: ^0.20.1
  geolocator: ^13.0.2
  adhan: ^2.0.0+1
  provider: ^6.1.2
  flutter_svg: ^2.0.16
  table_calendar: ^3.1.3
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  permission_handler: ^11.3.1
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  http: ^1.2.0
  crypto: ^3.0.5
  url_launcher: ^6.3.0
  app_links: ^6.3.0
  flutter_timezone: ^5.0.2
  hijri: ^3.0.0
  audioplayers: ^6.1.0
  share_plus: ^10.1.2
  package_info_plus: ^8.1.2
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/l10n/
    - assets/audio/

  fonts:
    - family: DigitalMadina
      fonts:
        - asset: assets/fonts/DigitalMadina-NONV1.ttf
    - family: DigitalKhatt
      fonts:
        - asset: assets/fonts/DigitalKhatt-OldMadina.otf

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#3B0E81"
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#3B0E81"
    theme_color: "#3B0E81"
  windows:
    generate: true
    image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#1A0846"
  android_12:
    color: "#1A0846"
  android: true
  ios: true
  web: false
